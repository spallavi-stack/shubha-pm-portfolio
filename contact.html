<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Get in touch - Shubha's PM Portfolio</title>
<style>
  :root{
    --teal:#0F9D8F;
    --teal-dark:#0B7A70;
    --navy:#180D67;
    --ink:#1B1F23;
    --ink-soft:#4B5560;
    --paper:#FFFFFF;
    --paper-soft:#F6F8F8;
    --border:#E3E8E8;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
    color:var(--ink);
    background:var(--paper);
    line-height:1.6;
  }
  .wrap{max-width:960px;margin:0 auto;padding:0 24px;}

  nav{position:sticky;top:0;z-index:50;background:rgba(255,255,255,0.92);backdrop-filter:blur(8px);border-bottom:1px solid var(--border);}
  nav .wrap{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;max-width:960px;}
  nav .brand{font-weight:700;letter-spacing:-0.02em;color:var(--navy);font-size:16px;text-decoration:none;}
  nav .brand span{color:var(--teal);}
  nav a.back{color:var(--teal-dark);text-decoration:none;font-size:13.5px;font-weight:600;}

  header.hero{
    background:linear-gradient(160deg, var(--navy) 0%, #241559 55%, var(--teal-dark) 130%);
    color:#fff;padding:64px 0 48px;
  }
  .eyebrow{
    display:block;font-size:12.5px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;
    color:#BFF3EC;margin-bottom:10px;
  }
  h1.title{font-size:36px;line-height:1.15;margin:0;letter-spacing:-0.02em;max-width:640px;}

  section{padding:56px 0;}

  .contact-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;}
  @media (max-width:800px){.contact-grid{grid-template-columns:1fr;}}

  .contact-card{
    border:1px solid var(--border);border-radius:14px;padding:24px;
    display:flex;flex-direction:column;gap:10px;
  }
  .contact-card .ic{font-size:26px;}
  .contact-card h3{font-size:16px;margin:0;}
  .contact-card p{font-size:13.5px;color:var(--ink-soft);margin:0;flex:1;}
  .contact-card .cta{font-size:13.5px;font-weight:700;color:var(--teal-dark);text-decoration:none;}
  .contact-card.disabled .cta{color:var(--ink-soft);}
  .contact-card.disabled{opacity:0.7;}

  footer{padding:32px 0;border-top:1px solid var(--border);color:var(--ink-soft);font-size:13px;}
  footer a{color:var(--teal-dark);}
</style>
</head>
<body>

<nav>
  <div class="wrap">
    <a class="brand" href="index.html">Shubha<span>.</span> PM Portfolio</a>
    <a class="back" href="index.html">← Back to portfolio</a>
  </div>
</nav>

<header class="hero">
  <div class="wrap">
    <h1 class="title">Get in touch</h1>
  </div>
</header>

<section>
  <div class="wrap">
    <div class="contact-grid">
      <div class="contact-card">
        <span class="ic">✉️</span>
        <h3>Email</h3>
        <p>The fastest way to reach me directly.</p>
        <a class="cta" href="mailto:shubhapallavi.eesl@gmail.com">shubhapallavi.eesl@gmail.com →</a>
      </div>

      <div class="contact-card">
        <span class="ic">💼</span>
        <h3>LinkedIn</h3>
        <p>Background, experience, and where I've worked.</p>
        <a class="cta" href="https://www.linkedin.com/in/shubha-pallavi-14b2335a/" target="_blank" rel="noopener">View profile →</a>
      </div>

      <div class="contact-card">
        <span class="ic">📄</span>
        <h3>CV</h3>
        <p>Full background and experience, in PDF form.</p>
        <a class="cta" href="shubha-cv-v2.pdf" target="_blank" rel="noopener">Download CV →</a>
      </div>
    </div>
  </div>
</section>

</body>
</html>
